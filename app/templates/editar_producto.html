{% extends './plantillaapp.html' %}

{% block titulo %}Editar Producto{% endblock %}

{% block LinkAdicional %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/editar_producto.css') }}">
{% endblock %}

{% block body %}

<!-- Submenú de navegación -->
<div class="Submenunavegacion">
    <ul>
        <li><a href="{{ url_for('admin.GestionProductos') }}"><i class="fas fa-plus-circle"></i> Crear Producto</a></li>
        <li><a href="{{ url_for('admin.editar_productos') }}"><i class="fas fa-edit"></i> Editar Productos</a></li>
        <li><a href="{{ url_for('admin.eliminar_productos') }}"><i class="fas fa-trash-alt"></i> Eliminar Productos</a></li>
        <li><a href="{{ url_for('admin.gestion_generos') }}"><i class="fas fa-tags"></i> Géneros</a></li>
    </ul>
</div>

<main>
    <form action="{{ url_for('admin.editar_producto', id=producto[0]) }}" method="POST" class="form-container"
          enctype="multipart/form-data">

        <div class="form-header">
            <i class="fas fa-pen-to-square" style="color:rgba(255,255,255,0.85); font-size:1.2rem;"></i>
            <h2>Editar Producto <span style="opacity:0.7; font-weight:400; font-size:0.9rem;">#{{ producto[0] }}</span></h2>
        </div>

        <div class="form-group">
            <label>Imagen actual</label>
            <div class="current-image">
                <img src="{{ producto[1] }}" alt="Imagen actual del producto" class="product-image">
            </div>
        </div>

        <div class="form-group">
            <label for="imagen"><i class="fas fa-camera"></i> Cambiar imagen</label>
            <input type="file" id="imagen" name="imagen" accept="image/*">
        </div>

        <div class="form-group">
            <label for="nombre"><i class="fas fa-tag"></i> Nombre</label>
            <input type="text" id="nombre" name="nombre" value="{{ producto[2] }}" required>
        </div>

        <div class="form-group">
            <label for="precio"><i class="fas fa-dollar-sign"></i> Precio</label>
            <input type="number" id="precio" name="precio" value="{{ producto[3] }}" step="0.01" required>
        </div>

        <div class="form-group">
            <label for="stock"><i class="fas fa-cubes"></i> Stock</label>
            <input type="number" id="stock" name="stock" value="{{ producto[7] }}" min="0" required>
        </div>

        <div class="form-group">
            <label for="referencia"><i class="fas fa-barcode"></i> Referencia</label>
            <input type="text" id="referencia" name="referencia" value="{{ producto[4] }}" required>
        </div>

        <div class="form-group">
            <label for="genero_id"><i class="fas fa-layer-group"></i> Género / Categoría</label>
            <select id="genero_id" name="genero_id" required>
                <option value="" disabled>Seleccione un género</option>
                {% for genero in generos %}
                <option value="{{ genero[0] }}" {% if genero[0] == producto[5] %}selected{% endif %}>{{ genero[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="descripcion"><i class="fas fa-align-left"></i> Descripción</label>
            <textarea id="descripcion" name="descripcion" required>{{ producto[6] }}</textarea>
        </div>

        <div class="form-group">
            <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Guardar Cambios</button>
        </div>
    </form>
</main>
{% endblock %}
