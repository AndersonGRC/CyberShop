{% extends './plantillaindex.html' %}
{% block titulo %}{{ datosApp.titulo }}{% endblock %}
{% block LinkAdicional %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block body %}
<div class="main">
    <h2>Iniciar Sesión</h2>
    <form id="loginForm" method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email" placeholder="tu@correo.com" required>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" placeholder="Tu contraseña" required>

        <button type="submit">Ingresar</button>
    </form>

    <div class="separador-google">o</div>

    <div class="google-wrapper">
        <a href="{{ url_for('auth.google_login') }}" class="btn-google">
            <img src="https://developers.google.com/identity/images/g-logo.png" width="20" alt="Google">
            Continuar con Google
        </a>
    </div>

    <p>¿No tienes una cuenta? <a href="{{ url_for('auth.registrar_cliente') }}">Regístrate aquí</a>.</p>

</div>
{% endblock %}
