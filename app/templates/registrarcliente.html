{% extends './plantillaindex.html' %}
{% block titulo %}{{ datosApp.titulo }}{% endblock %}
{% block LinkAdicional %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/registro.css') }}">
{% endblock %}

{% block body %}
<div class="container">
    <!-- Columna de la imagen -->
    <div class="left-column">
        <img src="{{ url_for('static', filename='img/Logo.png') }}" alt="Imagen de registro">
    </div>

    <!-- Columna del formulario -->
    <div class="right-column">
        <div class="registro-google-wrap">
            <a href="{{ url_for('auth.google_login') }}" class="btn-google">
                <img src="https://developers.google.com/identity/images/g-logo.png" width="18" alt="Google">
                Registrarse con Google
            </a>
        </div>
        <div class="separador">— o completa el formulario —</div>
        <form id="registroForm" method="POST" action="{{ url_for('auth.registrar_cliente') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <h2>Registro de Cliente</h2>

            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo" required>

            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" placeholder="tu@correo.com" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>

            <label for="fecha_nacimiento">Fecha de Nacimiento:</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>

            <label for="telefono">Teléfono (opcional):</label>
            <input type="tel" id="telefono" name="telefono" placeholder="Ej: 3001234567">

            <label for="direccion">Dirección (opcional):</label>
            <input type="text" id="direccion" name="direccion" placeholder="Ej: Calle 123 #45-67">

            <button type="submit">Registrarse</button>
        </form>
    </div>
</div>

{% endblock %}
